version: '3.8'

services:
  flight_service:
    build: ./src/flight_service
    ports:
      - "8000:8000"
    networks:
      - flight_ops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/flights"]
      interval: 15s
      timeout: 5s
      retries: 3

  booking_service:
    build: ./src/booking_service
    ports:
      - "8001:8001"
    networks:
      - flight_ops_net
    depends_on:
      flight_service:
        condition: service_healthy
      notification_service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/bookings"]
      interval: 15s
      timeout: 5s
      retries: 3

  notification_service:
    build: ./src/notification_service
    ports:
      - "8002:8002"
    networks:
      - flight_ops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/notifications"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  flight_ops_net:
    driver: bridge
